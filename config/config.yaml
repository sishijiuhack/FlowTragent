project:
  name: FlowTragent

paths:
  nova_f: libs/nova-f
  pcap_dir: data/pcap
  csv_dir: data/csv
  index_dir: data/index
  rag_dir: data/rag
  report_dir: reports

retrieval:
  model_name: libs/nova-f/models/all-MiniLM-L6-v2
  top_k: 5
  score_threshold: 0.5

ollama:
  host: http://127.0.0.1:11434
  model: phi3:mini
  enabled: false

live_capture:
  duration: 30
  packet_count: 0

live:
  alert_db: data/live/alerts.db
  incoming_dir: data/live/incoming
  segment_seconds: 60
  min_risk_score: 50
  max_concurrent_analyses: 1
  ollama_mode: scheduled
  ollama_interval_minutes: 10
